# Nginx site config for the Ubuntu VPS (production).
# Place in /etc/nginx/sites-available/medeo and symlink into sites-enabled.
# TLS certificates are managed by Certbot (it will edit/append the 443 block).
#
# Traffic flow:
#   Browser --(443/TLS)--> Nginx --(proxy)--> Next.js (127.0.0.1:3000)
#   Next.js --(rewrite /api/*)--> Express API (127.0.0.1:3001)
#
# Everything is served from a single public origin, so admin session
# cookies stay Same-Origin.

server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com; # <-- replace with your domain

    # Certbot will add the 443 server block and the redirect here.

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
